server:
  port: 10080

spring:
  application:
    name: supervisor-agent
  config:
    import:
      - optional:nacos:ai-smartclinic-common.yml
      - optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_CONFIG_NAMESPACE:${NACOS_NAMESPACE:}}
        group: ${NACOS_CONFIG_GROUP:AI_SMARTCLINIC}
        file-extension: yml
        refresh-enabled: true
  ai:
    model:
      chat: dashscope
      embedding: dashscope
      image: none
      audio:
        speech: none
        transcription: none
      rerank: none
      video: none
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      agent:
        enabled: false
      image:
        enabled: false
      chat:
        enabled: true
        options:
          model: ${DASHSCOPE_MODEL:qwen-plus}
      embedding:
        enabled: true
        options:
          model: ${AI_EMBEDDING_DEFAULT_MODEL:text-embedding-v4}

ai:
  service:
    model-router:
      chat:
        default-model: ${AI_CHAT_DEFAULT_MODEL:qwen-plus}
        fallback-models:
          - ${AI_CHAT_FALLBACK_MODEL_1:qwen-turbo}
          - ${AI_CHAT_FALLBACK_MODEL_2:qwen-max}
        fallback-enabled: true
        exhausted-ttl: ${AI_CHAT_EXHAUSTED_TTL:PT1H}
        transient-retries: ${AI_CHAT_TRANSIENT_RETRIES:1}
      embedding:
        default-model: ${AI_EMBEDDING_DEFAULT_MODEL:text-embedding-v4}
        fallback-models:
          - ${AI_EMBEDDING_FALLBACK_MODEL_1:text-embedding-v3}
        fallback-enabled: true
        exhausted-ttl: ${AI_EMBEDDING_EXHAUSTED_TTL:PT1H}
        transient-retries: ${AI_EMBEDDING_TRANSIENT_RETRIES:1}

app:
  agents:
    triage:
      base-url: ${TRIAGE_AGENT_BASE_URL:http://localhost:10081}
    registration:
      base-url: ${REGISTRATION_AGENT_BASE_URL:http://localhost:10082}
    guide:
      base-url: ${GUIDE_AGENT_BASE_URL:http://localhost:10083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
