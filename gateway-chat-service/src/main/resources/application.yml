server:
  port: 8080

spring:
  application:
    name: gateway-chat-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:Ai-SmartClinic}?currentSchema=${POSTGRES_SCHEMA:ai_registration}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  config:
    import:
      - optional:nacos:ai-smartclinic-common.yml
      - optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_CONFIG_NAMESPACE:${NACOS_NAMESPACE:}}
        group: ${NACOS_CONFIG_GROUP:AI_SMARTCLINIC}
        file-extension: yml
        refresh-enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      timeout: 5s

app:
  auth:
    enabled: ${APP_AUTH_ENABLED:true}
    token-header: ${APP_AUTH_TOKEN_HEADER:X-Auth-Token}
    token-ttl: ${APP_AUTH_TOKEN_TTL:PT12H}
    wechat:
      app-id: ${WECHAT_MINIAPP_APP_ID:}
      app-secret: ${WECHAT_MINIAPP_APP_SECRET:}
      code2-session-url: ${WECHAT_CODE2_SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
  supervisor:
    base-url: ${SUPERVISOR_BASE_URL:http://localhost:10080}
  trace-audit:
    registration-base-url: ${REGISTRATION_MCP_BASE_URL:http://localhost:10103}
    registration-agent-base-url: ${REGISTRATION_AGENT_BASE_URL:http://localhost:10082}
    schedule-base-url: ${SCHEDULE_MCP_BASE_URL:http://localhost:10102}
    knowledge-base-url: ${KNOWLEDGE_SERVICE_BASE_URL:http://localhost:10200}
  patient:
    base-url: ${PATIENT_MCP_BASE_URL:http://localhost:10101}
  registration:
    base-url: ${REGISTRATION_MCP_BASE_URL:http://localhost:10103}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
