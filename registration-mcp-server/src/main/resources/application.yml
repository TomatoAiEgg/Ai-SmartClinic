server:
  port: 10103

spring:
  application:
    name: registration-mcp-server
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:Ai-SmartClinic}?currentSchema=${POSTGRES_SCHEMA:ai_registration}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.mcp.client.NacosMcpAutoConfiguration
  ai:
    mcp:
      server:
        name: registration-mcp-server
        version: 0.1.0
        type: SYNC
    alibaba:
      mcp:
        nacos:
          register:
            enabled: ${NACOS_MCP_REGISTER_ENABLED:false}
          server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
