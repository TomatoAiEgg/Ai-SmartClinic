spring:
  ai:
    model:
      chat: dashscope
      embedding: dashscope
      image: none
      audio:
        speech: none
        transcription: none
      rerank: none
      video: none
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      agent:
        enabled: false
      image:
        enabled: false
      chat:
        enabled: true
        options:
          model: ${AI_CHAT_DEFAULT_MODEL:qwen-plus}
      embedding:
        enabled: true
        options:
          model: ${AI_EMBEDDING_DEFAULT_MODEL:text-embedding-v2}

ai:
  service:
    model-router:
      chat:
        default-model: ${AI_CHAT_DEFAULT_MODEL:qwen-plus}
        fallback-models:
          - ${AI_CHAT_FALLBACK_MODEL_1:qwen-turbo}
          - ${AI_CHAT_FALLBACK_MODEL_2:qwen-max}
        fallback-enabled: true
        exhausted-ttl: ${AI_CHAT_EXHAUSTED_TTL:PT1H}
        transient-retries: ${AI_CHAT_TRANSIENT_RETRIES:1}
      embedding:
        default-model: ${AI_EMBEDDING_DEFAULT_MODEL:text-embedding-v2}
        fallback-models:
          - ${AI_EMBEDDING_FALLBACK_MODEL_1:text-embedding-v2}
        fallback-enabled: true
        exhausted-ttl: ${AI_EMBEDDING_EXHAUSTED_TTL:PT1H}
        transient-retries: ${AI_EMBEDDING_TRANSIENT_RETRIES:1}
