spring:
  application:
    name: AI-QA
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Ai-QA}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: AiQaHikariPool
      maximum-pool-size: 12
      minimum-idle: 4
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000
      leak-detection-threshold: 60000
      data-source-properties:
        reWriteBatchedInserts: true
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: 0
      timeout: 5s
  cache:
    type: redis
    redis:
      time-to-live: 30m
      cache-null-values: false
  ai:
    openai:
      enabled: true
      api-key: ${SPRING_AI_OPENAI_API_KEY:${QWEN_API_KEY:}}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          timeout: 120
      connection-pool:
        max-idle: 10
        keep-alive: 300
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 7000

logging:
  config: classpath:logback-spring.xml

rocketmq:
  name-server: ${ai.service.rocketmq.document-process.name-server}

ai:
  service:
    document:
      embedding-batch-size: ${AI_DOCUMENT_EMBEDDING_BATCH_SIZE:10}
      storage:
        type: ${AI_DOCUMENT_STORAGE_TYPE:minio}
        local:
          root: ${AI_DOCUMENT_STORAGE_LOCAL_ROOT:data/kb-files}
        minio:
          endpoint: ${AI_DOCUMENT_STORAGE_MINIO_ENDPOINT:http://127.0.0.1:9100}
          access-key: ${AI_DOCUMENT_STORAGE_MINIO_ACCESS_KEY:minioadmin}
          secret-key: ${AI_DOCUMENT_STORAGE_MINIO_SECRET_KEY:minioadmin}
          bucket: ${AI_DOCUMENT_STORAGE_MINIO_BUCKET:aiqa-documents}
          auto-create-bucket: ${AI_DOCUMENT_STORAGE_MINIO_AUTO_CREATE_BUCKET:true}
      splitter:
        default-chunk-size: 512
        min-chunk-size-chars: 128
        min-chunk-length-to-embed: 5
        max-num-chunks: 10000
        keep-separator: true
    rerank:
      enabled: true
      model: gte-rerank-v2
      min-score: 0.5
      top-n: 3
    model-router:
      chat:
        default-model: ${AI_CHAT_DEFAULT_MODEL:qwen-vl-plus-latest}
        fallback-models:
          - ${AI_CHAT_FALLBACK_MODEL_1:qwen-coder-turbo-0919}
          - ${AI_CHAT_FALLBACK_MODEL_2:qwen3-vl-235b-a22b-thinking}
          - ${AI_CHAT_FALLBACK_MODEL_3:qwen-max}
          - ${AI_CHAT_FALLBACK_MODEL_4:qwen2.5-14b-instruct}
          - ${AI_CHAT_FALLBACK_MODEL_5:qwen3.6-plus}
          - ${AI_CHAT_FALLBACK_MODEL_6:qwen-vl-ocr-latest}
          - ${AI_CHAT_FALLBACK_MODEL_7:qwen3-32b}
          - ${AI_CHAT_FALLBACK_MODEL_8:qwen-vl-plus}
        exhausted-ttl: ${AI_CHAT_EXHAUSTED_TTL:PT1H}
        transient-retries: ${AI_CHAT_TRANSIENT_RETRIES:1}
      embedding:
        default-model: ${AI_EMBEDDING_DEFAULT_MODEL:text-embedding-v4}
        fallback-models:
          - ${AI_EMBEDDING_FALLBACK_MODEL_1:tongyi-embedding-vision-plus}
          - ${AI_EMBEDDING_FALLBACK_MODEL_2:multimodal-embedding-v1}
        exhausted-ttl: ${AI_EMBEDDING_EXHAUSTED_TTL:PT1H}
        transient-retries: ${AI_EMBEDDING_TRANSIENT_RETRIES:1}
    rocketmq:
      document-process:
        enabled: ${AI_DOCUMENT_PROCESS_MQ_ENABLED:true}
        name-server: ${AI_DOCUMENT_PROCESS_NAME_SERVER:${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}}
        topic: ${AI_DOCUMENT_PROCESS_TOPIC:aiqa_document_process}
        producer-group: ${AI_DOCUMENT_PROCESS_PRODUCER_GROUP:aiqa-document-process-producer-group}
        consumer-group: ${AI_DOCUMENT_PROCESS_CONSUMER_GROUP:aiqa-document-process-group}
        tag: ${AI_DOCUMENT_PROCESS_TAG:document}
        send-timeout: ${AI_DOCUMENT_PROCESS_SEND_TIMEOUT:3000}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
  type-handlers-package: cn.net.tomatoegg.ai.handler

sa-token:
  token-name: aiqa-token
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-cookie: true
  is-read-header: true
